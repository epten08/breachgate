# yaml-language-server: $schema=./security.config.schema.json
version: "1.0"

target:
  # Path to docker-compose file (used to start/stop the target)
  # dockerCompose: ./docker-compose.yml
  # Or specify a running API directly
  baseUrl: http://localhost:3000
  healthEndpoint: /health
  # Path to OpenAPI spec (optional, improves dynamic scan accuracy)
  # openApiSpec: ./openapi.yaml

  # Endpoints to test (used by AI scanner if no OpenAPI spec)
  endpoints:
    - path: /api/login
      method: POST
      description: "Login endpoint accepting username/password. Test for SQL injection in credentials, brute-force, and authentication bypass."
      body:
        username: test
        password: test
    - path: /api/users
      method: GET
      description: "Fetch user by id param. Test for IDOR (access other users by changing id), broken access control, and sensitive data exposure."
      params:
        id: admin
    - path: /api/search
      method: GET
      description: "Search endpoint with q param. Test for SQL injection, XSS via reflected input, and NoSQL injection."
      params:
        q: test
    - path: /api/execute
      method: POST
      description: "Executes a shell command from the command body field. Test for OS command injection (e.g. ; id, && cat /etc/passwd), XSS, and input validation bypass."
      body:
        command: "echo hello"
    - path: /api/debug
      method: GET
      description: "Debug info endpoint. Test for sensitive data exposure, stack traces, environment variable leakage, and information disclosure."
    - path: /api/file
      method: GET
      description: "Reads a file from the path param. Test for path traversal (../../etc/passwd), directory traversal, and arbitrary file read."
      params:
        path: /etc/passwd
    - path: /api/data
      method: GET
      description: "Fetches a database record by id param. Test for SQL injection (e.g. 1 OR 1=1, 1; DROP TABLE), IDOR, and error-based SQL injection."
      params:
        id: "1"

auth:
  type: none
  # type: jwt
  # token: ${JWT_TOKEN}
  # preScan:
  #   command: node
  #   args: ["scripts/get-ci-token.js"]
  #   output: json
  #   tokenField: accessToken
  #   headersField: headers
  # type: apikey
  # apiKey: ${API_KEY}
  # headerName: X-API-Key
  # Multi-role scans run dynamic and AI checks once per role.
  # roles:
  #   - name: anonymous
  #     type: none
  #   - name: user
  #     type: jwt
  #     token: ${USER_JWT}
  #   - name: admin
  #     type: session
  #     cookieName: sid
  #     cookieValue: ${ADMIN_SESSION_COOKIE}
  #     headers:
  #       X-Tenant: ci

scanners:
  static:
    enabled: true
    trivy:
      severityThreshold: MEDIUM
      ignoreUnfixed: false

  container:
    enabled: true
    images: [demo-vulnerable-api] # Auto-detected from docker-compose if not specified
    trivy:
      severityThreshold: MEDIUM
      ignoreUnfixed: false

  dynamic:
    enabled: true
    zap:
      apiScanType: api
      maxDuration: 300 # seconds

  ai:
    enabled: true
    provider: anthropic
    model: claude-sonnet-4-6
    maxTests: 30
    deterministic: true
    # Save generated AI test cases for replayable CI failures.
    # saveTests: ./security-reports/ai-tests-{role}.json
    # replayTests: ./security-reports/ai-tests-user.json

thresholds:
  failOn: HIGH      # Exit with error if findings at this level or above
  warnOn: MEDIUM    # Show warnings for findings at this level

safety:
  # passive: no active AI tests and no ZAP active scan
  # safe-active: authenticated seeding, passive ZAP alerts, guarded AI requests
  # full-active: enables ZAP active scan and destructive methods
  profile: safe-active
  allowProductionTargets: false
  allowedHosts:
    - localhost
    - 127.0.0.1
  excludedPaths:
    - /admin/delete*
  maxRequestsPerSecond: 2
  allowDestructiveMethods: false

policy:
  profile: main     # pull-request | main | release | nightly
  # baselinePath: ./.breach-gate-baseline.yml
  # differentialOnly: true

reporting:
  outputDir: ./security-reports
  formats:
    - markdown
    - json
    - sarif
  includeEvidence: true

