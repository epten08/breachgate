name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Build, typecheck, test, and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run test:cli
      - run: npm run build
      - run: npm audit --omit=dev
      - run: npm run sbom -- security-reports/sbom.cdx.json
      - run: npm pack --dry-run

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: security-reports/sbom.cdx.json

  demo-scan:
    name: Demo API scan smoke
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Start demo API
        shell: bash
        run: |
          npm run demo &
          echo $! > demo-api.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Run Breach Gate demo smoke scan
        run: |
          node dist/cli/index.js scan \
            --ci \
            --target http://127.0.0.1:3000 \
            --skip-static \
            --skip-container \
            --skip-dynamic \
            --skip-ai \
            --format json,markdown,sarif \
            --output security-reports/demo

      - name: Stop demo API
        if: always()
        shell: bash
        run: |
          if [ -f demo-api.pid ]; then
            kill "$(cat demo-api.pid)" || true
          fi

      - name: Upload demo scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-security-reports
          path: security-reports/demo/

