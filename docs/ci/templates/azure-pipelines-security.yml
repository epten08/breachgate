trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

schedules:
  - cron: "17 2 * * *"
    displayName: Nightly security scan
    branches:
      include:
        - main
    always: true

pool:
  vmImage: ubuntu-latest

variables:
  SEC_BOT_OUTPUT: security-reports

steps:
  - checkout: self

  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"

  - script: |
      if [ "$(Build.Reason)" = "PullRequest" ]; then
        echo "##vso[task.setvariable variable=SEC_BOT_ARGS]--profile pull-request --differential --skip-dynamic --skip-ai"
      elif [ "$(Build.Reason)" = "Schedule" ]; then
        echo "##vso[task.setvariable variable=SEC_BOT_ARGS]--profile nightly -v"
      else
        echo "##vso[task.setvariable variable=SEC_BOT_ARGS]--profile main"
      fi
    displayName: Select scan depth

  - script: |
      npx sec-bot@1.0.0 scan --ci --config security.config.yml --format json,markdown,sarif --output "$(SEC_BOT_OUTPUT)" $(SEC_BOT_ARGS)
    displayName: Run Sec Bot
    env:
      JWT_TOKEN: $(SECURITY_BOT_JWT_TOKEN)
      API_KEY: $(SECURITY_BOT_API_KEY)
      OPENAI_API_KEY: $(OPENAI_API_KEY)
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)

  - publish: $(SEC_BOT_OUTPUT)
    artifact: security-reports
    condition: always()
