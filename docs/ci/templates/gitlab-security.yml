stages:
  - security

security_bot:
  stage: security
  image: ghcr.io/OWNER/sec-bot:1.0.0
  variables:
    SEC_BOT_OUTPUT: security-reports
  script:
    - sec-bot scan --ci --config security.config.yml --format json,markdown,sarif --output "$SEC_BOT_OUTPUT" ${SEC_BOT_ARGS:-}
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - security-reports/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        SEC_BOT_ARGS: "--profile pull-request --differential --skip-dynamic --skip-ai"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        SEC_BOT_ARGS: "--profile main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
      variables:
        SEC_BOT_ARGS: "--profile nightly -v"
