name: Breach Gate
description: OWASP API security scanner with AI-assisted testing, static analysis, container scanning, and GraphQL probing.
author: epten08

branding:
  icon: shield
  color: red

inputs:
  config:
    description: Path to the Breach Gate YAML config file.
    required: false
    default: security.config.yml
  target:
    description: Target API URL. Overrides target.baseUrl from the config when set.
    required: false
    default: ""
  output:
    description: Directory where reports should be written.
    required: false
    default: security-reports
  format:
    description: Comma-separated report formats.
    required: false
    default: json,markdown,sarif
  scan-args:
    description: Extra arguments passed to `breach-gate scan`.
    required: false
    default: ""
  anthropic-api-key:
    description: Anthropic API key for AI-assisted testing. Can also be set via ANTHROPIC_API_KEY env var.
    required: false
    default: ""
  openai-api-key:
    description: OpenAI API key for AI-assisted testing. Can also be set via OPENAI_API_KEY env var.
    required: false
    default: ""
  working-directory:
    description: Repository directory to scan.
    required: false
    default: .
  node-version:
    description: Node.js version used to build the action CLI.
    required: false
    default: "20"
  install-command:
    description: Command used to install this action's dependencies.
    required: false
    default: npm ci

outputs:
  verdict:
    description: Final scan verdict — PASS or FAIL.
    value: ${{ steps.scan.outputs.verdict }}
  report-json:
    description: Path to the JSON report file.
    value: ${{ steps.scan.outputs.report_json }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ github.action_path }}/package-lock.json

    - name: Install Breach Gate
      shell: bash
      working-directory: ${{ github.action_path }}
      run: ${{ inputs.install-command }}

    - name: Build Breach Gate
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm run build

    - name: Run Breach Gate
      id: scan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key || env.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key || env.OPENAI_API_KEY }}
      run: |
        cmd=(node "$GITHUB_ACTION_PATH/dist/cli/index.js" scan --ci)
        cmd+=(--config "${{ inputs.config }}")
        cmd+=(--output "${{ inputs.output }}")
        cmd+=(--format "${{ inputs.format }}")

        if [ -n "${{ inputs.target }}" ]; then
          cmd+=(--target "${{ inputs.target }}")
        fi

        if [ -n "${{ inputs.scan-args }}" ]; then
          read -r -a extra_args <<< "${{ inputs.scan-args }}"
          cmd+=("${extra_args[@]}")
        fi

        output=$("${cmd[@]}" 2>&1)
        exit_code=$?
        echo "$output"

        verdict=$(echo "$output" | grep -oP '(?<=SECURITY STATUS: )\S+' | tail -1)
        [ -z "$verdict" ] && verdict=$([ $exit_code -eq 0 ] && echo "PASS" || echo "FAIL")
        report_json="${{ inputs.output }}/breach-gate-report.json"

        echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
        echo "report_json=$report_json" >> "$GITHUB_OUTPUT"

        exit $exit_code

